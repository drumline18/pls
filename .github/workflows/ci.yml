name: ci

on:
  push:
    paths:
      - 'pls/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'pls/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pls
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Verify Go version
        run: go version

      - name: Run tests
        run: go test ./...

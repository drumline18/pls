name: release-dry-run

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          install-only: true

      - name: Run tests
        run: go test ./...

      - name: Build snapshot artifacts
        run: goreleaser release --snapshot --clean --config .goreleaser.yaml --skip=publish,announce,sign
